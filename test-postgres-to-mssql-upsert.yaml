# Test: PostgreSQL → MSSQL (upsert)
source:
  type: postgres
  host: localhost
  port: 5432
  database: stackoverflow
  user: postgres
  password: "TestPass2024"
  schema: public
  ssl_mode: disable

target:
  type: mssql
  host: localhost
  port: 1434
  database: stackoverflow_target
  user: sa
  password: "TestPass2024"
  schema: dbo
  encrypt: false
  trust_server_cert: true

migration:
  target_mode: upsert
  workers: 4
  chunk_size: 50000
  # Source-side incremental filter
  date_updated_columns:
    - LastActivityDate
    - LastAccessDate
    - LastEditDate
    - ModifiedDate
    - UpdatedAt
    - CreationDate
    - Date
