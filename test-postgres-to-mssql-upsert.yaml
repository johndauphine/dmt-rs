# Test: PostgreSQL → MSSQL (upsert mode)
source:
  type: postgres
  host: localhost
  port: 5433
  database: stackoverflow
  schema: public
  user: postgres
  password: PostgresPassword123
  ssl_mode: disable

target:
  type: mssql
  host: localhost
  port: 1434
  database: stackoverflow_test_mssql3
  user: sa
  password: "TestPass2024"
  schema: dbo
  encrypt: false
  trust_server_cert: true

migration:
  target_mode: upsert
  workers: 4
  chunk_size: 50000
  # Source-side incremental filter: most-recently-modified columns first.
  # Hash parity with the matching drop_recreate config preserves watermarks.
  date_updated_columns:
    - LastActivityDate
    - LastAccessDate
    - LastEditDate
    - ModifiedDate
    - UpdatedAt
    - CreationDate
    - Date
