# Test: MySQL → MSSQL (upsert)
source:
  type: mysql
  host: localhost
  port: 3306
  database: stackoverflow
  schema: stackoverflow
  user: root
  password: "TestPass2024"
  ssl_mode: disable

target:
  type: mssql
  host: localhost
  port: 1434
  database: stackoverflow_target
  user: sa
  password: "TestPass2024"
  schema: dbo
  encrypt: false
  trust_server_cert: true

migration:
  target_mode: upsert
  workers: 4
  chunk_size: 50000
  # Source-side incremental filter
  date_updated_columns:
    - LastActivityDate
    - LastAccessDate
    - LastEditDate
    - ModifiedDate
    - UpdatedAt
    - CreationDate
    - Date
