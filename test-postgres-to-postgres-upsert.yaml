# Test: PostgreSQL → PostgreSQL (upsert)
source:
  type: postgres
  host: localhost
  port: 5432
  database: stackoverflow
  user: postgres
  password: "TestPass2024"
  schema: public
  ssl_mode: disable

target:
  type: postgres
  host: localhost
  port: 5434
  database: stackoverflow_target
  user: postgres
  password: "TestPass2024"
  schema: public
  ssl_mode: disable

migration:
  target_mode: upsert
  workers: 4
  chunk_size: 50000
  # Source-side incremental filter
  date_updated_columns:
    - LastActivityDate
    - LastAccessDate
    - LastEditDate
    - ModifiedDate
    - UpdatedAt
    - CreationDate
    - Date
